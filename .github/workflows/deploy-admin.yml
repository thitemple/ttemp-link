name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/db/**'
      - 'drizzle/**'
      - 'package.json'
      - 'bun.lock'
      - 'captain-definition-admin'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ttemp-link-admin
  cancel-in-progress: true

jobs:
  deploy:
    # Protect against accidental workflow_dispatch deploys from non-main refs.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.6'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint admin app
        run: bun run --cwd apps/admin lint

      - name: Type-check admin app
        run: bun run --cwd apps/admin check

      - name: Test admin app
        run: bun run --cwd apps/admin test

      - name: Build admin app
        run: bun run --cwd apps/admin build

      - name: Verify deployment files
        run: |
          test -f captain-definition-admin
          test -f apps/admin/Dockerfile

      - name: Prepare CapRover definition
        # deploy-from-github tar mode requires ./captain-definition at repository root.
        # This repo keeps app-specific definitions, so we map admin's file for packaging.
        run: cp captain-definition-admin captain-definition

      - name: Package deploy tarball
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='*/.turbo' \
            --exclude='*/.svelte-kit' \
            --exclude='*/build' \
            -cf deploy.tar .
          test -f deploy.tar

      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.2.0
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          token: ${{ secrets.CAPROVER_APP_TOKEN_TTEMP_ADMIN }}
          app: ttemp-admin
